version: "3.9"

services:
  back:
    build: ./back
    container_name: back
    ports:
      - "8080:8080"
    depends_on:
      - rabbitmq
    networks:
      - app-network

  middleware:
    build: ./middleware
    container_name: middleware
    depends_on:
      - rabbitmq
      - db
    networks:
      - app-network

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - app-network

  db:
    image: postgres:15
    container_name: db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: telemetrydb
    ports:
      - "5432:5432"
    volumes:
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - app-network

networks:
  app-network:
    driver: bridge